planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: false # Set to true ONLY if using Gazebo
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.125
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      cost_travel_multiplier: 1.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1e-10

global_costmap: # Changed from 'costmap'
  global_costmap: # Sub-namespace for Nav2
    ros__parameters:
      update_frequency: 2.0 # Increased for better sync
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false # Must match planner_server
      robot_radius: 0.1
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /map
        map_subscribe_transient_local: True
        
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /top_lidar_scan
          sensor_frame: top_lidar
          inf_is_valid: True
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: True


controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] 
    controller_plugins: ["FollowPath"]

    # Progress Checker: If the bot moves less than 0.02m in 10 seconds, it triggers a failure/recovery
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.02
      movement_time_allowance: 10.0

    # Goal Checker: How close is "close enough" to the final destination?
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    # The actual DWB Controller parameters
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: -0.40  # Your physical reverse limit
      max_vel_x: 0.40   # Your physical forward limit
      min_vel_y: 0.0    # Diff drive cannot strafe sideways
      max_vel_y: 0.0
      max_vel_theta: 2.5
      min_speed_xy: 0.0
      max_speed_xy: 0.40
      min_speed_theta: 0.0
      
      # Acceleration Limits
      acc_lim_x: 5.0
      acc_lim_y: 0.0
      acc_lim_theta: 1.0
      decel_lim_x: -5.0
      decel_lim_theta: -1.0

      # Trajectory Generation
      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 20
      sim_time: 1.5
      
      # The Critics: Deciding which generated path is the best
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      
      # Critic Weights: Tuning the brain of the controller
      BaseObstacle.scale: 0.02  # Avoid obstacles in the local costmap
      PathAlign.scale: 32.0     # Follow the global path strictly
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0     # Point the nose toward the goal
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0      # Don't wander away from the global path
      GoalDist.scale: 24.0      # Get closer to the goal
      RotateToGoal.scale: 32.0  # Allow rotating in place at the very end
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0  
      publish_frequency: 2.0
      global_frame: odom     
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true   
      
      # [THE FIX: Change these from 3.0 to 3]
      width: 3             
      height: 3            
      
      resolution: 0.05
      robot_radius: 0.1
      plugins: ["obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /top_lidar_scan
          sensor_frame: top_lidar
          data_type: "LaserScan"
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: True

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_rate_controller_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_navigate_through_poses_action_bt_node

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    # [THE FIX: Removed the costmap clearing plugins]
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1

lifecycle_manager_navigation:
  ros__parameters:
    autostart: true
    node_names: ['planner_server', 'controller_server', 'behavior_server', 'bt_navigator']